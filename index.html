<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brouhaha &mdash; Cover Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎨</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Syne+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090907;--panel:#0f0e0b;--panel2:#131210;
  --border:#1d1c18;--border2:#282620;
  --text:#ccc8bc;--muted:#5a5750;--muted2:#3a3830;
  --accent:#b74c5a;--accent-h:#c85868;
  --mono:'Syne Mono','Courier New',monospace;
  --sans:'Syne','Helvetica Neue',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px}
#app{display:grid;grid-template-rows:44px 1fr 30px;height:100vh}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.app-title{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.app-title span{color:var(--muted);font-weight:400;font-size:12px;margin-left:6px;letter-spacing:0.12em}
.header-right{display:flex;align-items:center;gap:10px}
.status-pill{font-size:10px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase}
#btn-export{background:var(--accent);color:#fff;border:none;padding:7px 16px;font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.15s}
#btn-export:hover{background:var(--accent-h)}
#btn-export:active{transform:scale(0.97)}

/* ── Main layout ── */
main{display:grid;grid-template-columns:210px 1fr 220px;overflow:hidden}

/* ── Panels ── */
.panel{border-right:1px solid var(--border);overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px}
.panel.right{border-right:none;border-left:1px solid var(--border)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.section-label{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border);font-family:var(--mono)}

/* ── Layer cards ── */
.layer-card{display:flex;align-items:center;gap:8px;padding:8px 9px;background:var(--panel2);border:1px solid var(--border);border-radius:3px;transition:border-color 0.15s}
.layer-card:hover{border-color:var(--border2)}

.swatch-wrap{width:34px;height:34px;border-radius:3px;overflow:hidden;position:relative;flex-shrink:0;border:1px solid rgba(255,255,255,0.07);cursor:pointer}
.swatch-wrap input[type=color]{position:absolute;inset:-8px;width:calc(100% + 16px);height:calc(100% + 16px);opacity:0;cursor:pointer;border:none;padding:0}
.swatch-bg{position:absolute;inset:0;pointer-events:none;border-radius:3px}

.layer-meta{flex:1;min-width:0}
.layer-name{font-size:10px;font-weight:500;color:var(--text);letter-spacing:0.06em;margin-bottom:2px;font-family:var(--sans)}
.layer-desc{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.hex-field{width:56px;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:3px 5px;text-transform:uppercase;flex-shrink:0;border-radius:2px;transition:border-color 0.15s,color 0.15s}
.hex-field:focus{outline:none;border-color:var(--border2);color:var(--text)}

/* ── Palette grid ── */
.pal-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.pal-card{border:1px solid var(--border);padding:7px 6px;cursor:pointer;background:var(--panel2);border-radius:3px;transition:border-color 0.15s}
.pal-card:hover{border-color:var(--border2)}
.pal-card.active{border-color:var(--accent)}
.pal-swatches{display:flex;height:10px;border-radius:2px;overflow:hidden;margin-bottom:5px}
.pal-swatch{flex:1}
.pal-name{font-size:9px;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.05em}

/* ── Upload / Extract ── */
.upload-zone{border:1px dashed var(--border2);padding:14px;text-align:center;cursor:pointer;font-size:10px;color:var(--muted);border-radius:3px;position:relative;transition:border-color 0.2s,color 0.2s;line-height:1.6}
.upload-zone:hover{border-color:#444;color:var(--text)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
#upload-img{display:none;width:100%;max-height:90px;object-fit:cover;border-radius:3px;margin-bottom:6px}
.ext-swatches{display:none;gap:3px}
.ext-sw{flex:1;height:22px;border-radius:2px;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s}
.ext-sw:hover{transform:scaleY(1.15)}
.ext-sw.selected{border-color:#fff}
#btn-apply-ext{display:none;width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:7px;cursor:pointer;border-radius:2px;transition:background 0.15s,border-color 0.15s,color 0.15s}
#btn-apply-ext:hover{background:var(--panel2);border-color:var(--border2);color:var(--text)}

/* ── SVG Stage ── */
#stage{display:flex;align-items:center;justify-content:center;padding:12px;background:#060504;overflow:hidden;position:relative}
#svg-wrap{position:relative;max-width:100%;max-height:100%;aspect-ratio:841.92/595.2;width:min(100%,calc(100vw - 450px));height:min(100%,calc((100vw - 450px) * 595.2 / 841.92));box-shadow:0 4px 50px rgba(0,0,0,0.85),0 0 0 1px rgba(255,255,255,0.04);overflow:hidden;border-radius:1px}
#svg-wrap svg{width:100%;height:auto;display:block}

/* ── Footer ── */
footer{display:flex;align-items:center;padding:0 18px;background:var(--panel);border-top:1px solid var(--border);gap:20px;color:var(--muted2);font-size:9px;letter-spacing:0.1em}
#status-msg{color:var(--muted);transition:color 0.3s}
.foot-sep{color:var(--border2)}

/* ── Tooltip ── */
.reset-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:10px;padding:2px 4px;border-radius:2px;transition:color 0.15s;font-family:var(--mono)}
.reset-btn:hover{color:var(--text)}

/* ── Beer stein easter egg ── */
#left-panel{position:relative}
#beer-stein{position:absolute;bottom:10px;left:10px;font-size:18px;opacity:0.15;pointer-events:none;line-height:1;user-select:none}

/* ── Right panel tabs ── */
.tab-bar{display:flex;gap:4px;margin-bottom:2px;flex-shrink:0}
.tab-btn{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;padding:6px 4px;cursor:pointer;border-radius:2px;transition:background 0.15s,border-color 0.15s,color 0.15s}
.tab-btn:hover{border-color:var(--border2);color:var(--text);background:#181714}
.tab-btn.active{background:#242018;border-color:var(--accent);color:var(--text);font-weight:500}
.tab-pane{display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.tab-pane.hidden{display:none}
.genre-label{font-size:8px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted2);padding:4px 0 2px;border-bottom:1px solid var(--border);font-family:var(--mono);margin-top:4px}
.genre-label:first-child{margin-top:0}
</style>
</head>

function setColor(id, hex) {
  const clean = hex.replace(/[^0-9a-fA-F#]/g,'');
  if (!/^#[0-9a-fA-F]{6}$/.test(clean)) return;
  state.colors[id] = clean.toLowerCase();
  const picker = document.getElementById('pick-'+id);
  const bg     = document.getElementById('bg-'+id);
  const field  = document.getElementById('hex-'+id);
  if (picker) picker.value = state.colors[id];
  if (bg)     bg.style.background = state.colors[id];
  if (field)  field.value = state.colors[id];
  renderSVG();
  setStatus('Editing · ' + state.colors[id]);
}

function applyPalette(name) {
  // Search PALETTES, SUGGESTED, and MORE palettes
  let p = PALETTES.find(x => x.name === name);
  if (!p) p = ALL_MORE.find(x => x.name === name);
  if (!p) {
    for (const genre of Object.values(SUGGESTED)) {
      p = genre.find(x => x.name === name);
      if (p) break;
    }
  }
  if (!p) return;
  state.activePal = name;
  Object.keys(p.c).forEach(id => setColor(id, p.c[id]));
  document.querySelectorAll('.pal-card').forEach(el =>
    el.classList.toggle('active', el.dataset.name === name));
  setStatus('Palette applied · ' + name);
}

function setStatus(msg) {
  const el = document.getElementById('status-msg');
  if (el) el.textContent = msg;
}

// ─────────────────────────────────────────────────────────
// EXPORT
// ─────────────────────────────────────────────────────────
function getPaletteName() {
  const allPals = [
    ...PALETTES, ...MORE_LIGHT, ...MORE_DARK, ...MORE_MONO,
    ...SUGGESTED.dark, ...SUGGESTED.light, ...SUGGESTED.mono,
  ];
  for (const p of allPals) {
    const match = Object.keys(p.c).every(id =>
      state.colors[id] === p.c[id].toLowerCase()
    );
    if (match) return p.name;
  }
  return null;
}

function exportPNG() {
  const SCALE = 2;
  const W = Math.round(841.92 * SCALE);
  const H = Math.round(595.2  * SCALE);
  const svgStr = '<?xml version="1.0" encoding="UTF-8"?>' + makeSVG(state.colors);
  const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
  const img = new Image();
  setStatus('Rendering PNG…');
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, W, H);
    const a = document.createElement('a');
    const palName = getPaletteName();
    let filename;
    if (palName) {
      filename = 'brouhaha-cover_' + palName.toLowerCase().replace(/[\s/]+/g, '-') + '.png';
    } else {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const date = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
      const time = pad(now.getHours()) + '-' + pad(now.getMinutes()) + '-' + pad(now.getSeconds());
      filename = 'brouhaha-cover_' + date + '_' + time + '.png';
    }
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setStatus('Exported ' + W + '×' + H + 'px PNG · ' + filename);
  };
  img.onerror = () => setStatus('Export failed — try again');
  img.src = url;
}

// ─────────────────────────────────────────────────────────
// IMAGE EXTRACTION
// ─────────────────────────────────────────────────────────
function kMeans(pixels, k, iters=15) {
  const step = Math.max(1, Math.floor(pixels.length/k));
  let centers = Array.from({length:k},(_,i)=>[...pixels[Math.min(i*step,pixels.length-1)]]);
  for (let iter=0; iter<iters; iter++) {
    const clusters = Array.from({length:k},()=>[]);
    for (const p of pixels) {
      let minD=Infinity,minI=0;
      centers.forEach((c,i)=>{
        const d=(p[0]-c[0])**2+(p[1]-c[1])**2+(p[2]-c[2])**2;
        if(d<minD){minD=d;minI=i;}
      });
      clusters[minI].push(p);
    }
    centers = clusters.map((cl,i)=>{
      if(!cl.length) return centers[i];
      return [
        cl.reduce((s,p)=>s+p[0],0)/cl.length,
        cl.reduce((s,p)=>s+p[1],0)/cl.length,
        cl.reduce((s,p)=>s+p[2],0)/cl.length,
      ];
    });
  }
  return centers;
}

function toHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}

function extractColors(imgEl) {
  const SIZE=200;
  const c=document.createElement('canvas');
  c.width=SIZE; c.height=SIZE;
  const ctx=c.getContext('2d');
  ctx.drawImage(imgEl,0,0,SIZE,SIZE);
  const d=ctx.getImageData(0,0,SIZE,SIZE).data;
  const pixels=[];
  for(let i=0;i<d.length;i+=4*6){
    if(d[i+3]>128) pixels.push([d[i],d[i+1],d[i+2]]);
  }
  if(pixels.length<5) return ['#888','#999','#aaa','#bbb','#ccc'];
  return kMeans(pixels,5).map(c=>toHex(c[0],c[1],c[2]));
}

function handleUpload(file) {
  if(!file||!file.type.startsWith('image/')) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const preview=document.getElementById('upload-img');
      preview.src=e.target.result;
      preview.style.display='block';
      const colors=extractColors(img);
      state.extracted=colors;
      const sw=document.getElementById('ext-swatches');
      sw.style.display='flex';
      sw.innerHTML=colors.map((hex,i)=>
        `<div class="ext-sw" style="background:${hex}" title="${hex}" data-i="${i}"></div>`
      ).join('');
      document.getElementById('btn-apply-ext').style.display='block';
      setStatus('Palette extracted · click Apply to use');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyExtracted() {
  if(!state.extracted) return;
  const ids=['cls1','cls2','cls3','cls4','cls5'];
  state.extracted.forEach((hex,i)=>{ if(i<ids.length) setColor(ids[i],hex); });
  document.querySelectorAll('.pal-card').forEach(el=>el.classList.remove('active'));
  state.activePal='';
  setStatus('Photo palette applied');
}

function switchTab(name) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  document.querySelector('[data-tab="'+name+'"]').classList.add('active');
}

// ─────────────────────────────────────────────────────────
// BUILD UI
// ─────────────────────────────────────────────────────────
function buildLayers() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  LAYERS.forEach(layer => {
    const hex = state.colors[layer.id];
    const card = document.createElement('div');
    card.className = 'layer-card';
    card.innerHTML = `
      <div class="swatch-wrap">
        <div class="swatch-bg" id="bg-${layer.id}" style="background:${hex}"></div>
        <input type="color" id="pick-${layer.id}" value="${hex}"
          oninput="setColor('${layer.id}',this.value);document.getElementById('bg-${layer.id}').style.background=this.value">
      </div>
      <div class="layer-meta">
        <div class="layer-name">${layer.name}</div>
        <div style="display:flex;align-items:center;gap:5px;min-width:0">
          <div class="layer-desc" style="flex:1;min-width:0">${layer.desc}</div>
          <input type="text" class="hex-field" id="hex-${layer.id}" value="${hex}" maxlength="7"
            onchange="setColor('${layer.id}',this.value)">
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function palCardHTML(p) {
  return `<div class="pal-card ${p.name===state.activePal?'active':''}" data-name="${p.name}"
    onclick="applyPalette('${p.name}')">
    <div class="pal-swatches">
      ${Object.values(p.c).map(hex=>`<div class="pal-swatch" style="background:${hex}"></div>`).join('')}
    </div>
    <div class="pal-name">${p.name}</div>
  </div>`;
}

function buildPalettes() {
  // Other tab: core presets
  const grid = document.getElementById('pal-grid');
  if (grid) grid.innerHTML = PALETTES.map(p => palCardHTML(p)).join('');

  // Other tab: extra palettes by mood
  const lightOther = document.getElementById('pal-grid-light-other');
  const darkOther  = document.getElementById('pal-grid-dark-other');
  const monoOther  = document.getElementById('pal-grid-mono-other');
  if (lightOther) lightOther.innerHTML = MORE_LIGHT.map(p => palCardHTML(p)).join('');
  if (darkOther)  darkOther.innerHTML  = MORE_DARK.map(p  => palCardHTML(p)).join('');
  if (monoOther)  monoOther.innerHTML  = MORE_MONO.map(p  => palCardHTML(p)).join('');

  // Suggested tab: by genre
  const darkGrid  = document.getElementById('pal-grid-dark');
  const lightGrid = document.getElementById('pal-grid-light');
  const monoGrid  = document.getElementById('pal-grid-mono');
  if (darkGrid)  darkGrid.innerHTML  = SUGGESTED.dark.map(p  => palCardHTML(p)).join('');
  if (lightGrid) lightGrid.innerHTML = SUGGESTED.light.map(p => palCardHTML(p)).join('');
  if (monoGrid)  monoGrid.innerHTML  = SUGGESTED.mono.map(p  => palCardHTML(p)).join('');
}

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  buildLayers();
  buildPalettes();
  renderSVG();

  document.getElementById('btn-export').addEventListener('click', exportPNG);
  document.getElementById('btn-reset').addEventListener('click', ()=>{
    state.colors={...DEFAULTS};
    buildLayers();
    renderSVG();
    applyPalette('Original');
    setStatus('Reset to original palette');
  });
  document.getElementById('file-inp').addEventListener('change', e=>{
    if(e.target.files[0]) handleUpload(e.target.files[0]);
  });
  document.getElementById('btn-apply-ext').addEventListener('click', applyExtracted);
});
</script>
</body>
</html>
